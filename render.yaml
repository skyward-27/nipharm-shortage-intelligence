services:
  - type: web
    name: npt-stock-intel
    runtime: python
    buildCommand: pip install -r scrapers/requirements.txt
    startCommand: streamlit run scrapers/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: REPORT_EMAIL
        sync: false
    autoDeploy: true

  - type: cron
    name: npt-biweekly-report
    runtime: python
    buildCommand: pip install -r scrapers/requirements.txt
    schedule: "0 8 1,15 * *"
    command: python scrapers/agent.py --report
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: REPORT_EMAIL
        sync: false
